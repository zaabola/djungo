<style>
    .session-detail {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }

    .detail-card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    .card-header {
        background: #3498db;
        color: white;
        padding: 20px;
    }

    .card-body {
        padding: 30px;
    }

    .detail-row {
        display: flex;
        margin-bottom: 15px;
        padding-bottom: 15px;
        border-bottom: 1px solid #ecf0f1;
    }

    .detail-label {
        font-weight: bold;
        width: 200px;
        color: #2c3e50;
    }

    .detail-value {
        flex: 1;
        color: #34495e;
    }

    .back-btn {
        background: #95a5a6;
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 5px;
        display: inline-block;
        margin-top: 20px;
    }

    .back-btn:hover {
        background: #7f8c8d;
    }
</style>

<div class="session-detail">
    <div class="detail-card">
        <div class="card-header">
            <h1>{{ session.title }}</h1>
        </div>
        <div class="card-body">
            <div class="detail-row">
                <div class="detail-label">Conférence:</div>
                <div class="detail-value">{{ session.conference.name }}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Sujet:</div>
                <div class="detail-value">{{ session.topic }}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Jour:</div>
                <div class="detail-value">{{ session.session_day }}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Heure:</div>
                <div class="detail-value">{{ session.start_time }} - {{ session.end_time }}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Salle:</div>
                <div class="detail-value">{{ session.room }}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Créé le:</div>
                <div class="detail-value">{{ session.created_at }}</div>
            </div>
            <div class="detail-row">
                <div class="detail-label">Modifié le:</div>
                <div class="detail-value">{{ session.updated_at }}</div>
            </div>
            
            <a href="{% url 'session_list' %}" class="back-btn">← Retour à la liste</a>
        </div>
    </div>
</div>
